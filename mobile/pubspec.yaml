name: devotiondash_mobile
description: DevotionDash mobile app — business workspace for Android & iOS
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2

  # Navigation
  go_router: ^17.1.0

  # Auth & secure storage
  flutter_secure_storage: ^10.0.0
  local_auth: ^3.0.1

  # UI
  cupertino_icons: ^1.0.9
  google_fonts: ^8.0.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  badges: ^3.1.2

  # Chat extras
  emoji_picker_flutter: ^4.4.0

  # Real-time
  socket_io_client: ^3.1.4

  # Notifications
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # Utilities
  intl: ^0.20.2
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  open_filex: ^4.5.0
  shared_preferences: ^2.5.5
  image_picker: ^1.1.2
  file_picker: ^10.3.10
  record: ^6.2.0
  path_provider: ^2.1.3
  permission_handler: ^12.0.1
  json_annotation: ^4.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  flutter_launcher_icons: ^0.14.4
  retrofit_generator: ^10.2.3
  riverpod_generator: ^4.0.3
  json_serializable: ^6.13.0
  freezed: ^3.2.5
  freezed_annotation: ^3.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/config/runtime.json
    - assets/images/

flutter_launcher_icons:
  image_path: "logo.png"
  android: true
  ios: true
  web:
    generate: true
    image_path: "logo.png"
    background_color: "#ffffff"
    theme_color: "#ffffff"
  windows:
    generate: true
    image_path: "logo.png"
    icon_size: 256
  macos:
    generate: true
    image_path: "logo.png"
