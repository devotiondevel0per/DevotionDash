name: zeddash_mobile
description: ZedDash mobile app — business workspace for Android & iOS
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP & API
  dio: ^5.4.0
  retrofit: ^4.1.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.4

  # Navigation
  go_router: ^14.2.0

  # Auth & secure storage
  flutter_secure_storage: ^9.0.0
  local_auth: ^2.3.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  badges: ^3.1.2
  flutter_adaptive_scaffold: ^0.2.0

  # Chat extras
  emoji_picker_flutter: ^3.1.0

  # Real-time
  socket_io_client: ^2.0.3+1

  # Notifications
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  open_filex: ^4.5.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  file_picker: ^8.0.7
  record: ^5.1.2
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  retrofit_generator: ^8.1.0
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/config/runtime.json
    - assets/images/
